    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;900&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #020617; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
            color: #f8fafc;
            overflow: hidden; /* Ekran kaydırmayı tamamen engeller */
        }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .ai-chat-bubble {
            background: linear-gradient(145deg, rgba(30,41,59,0.9), rgba(15,23,42,0.9));
            border-left: 4px solid #06b6d4;
        }

        .text-gradient {
            background: linear-gradient(to right, #22d3ee, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .text-gradient-gold {
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes popIn {
            0% { transform: scale(0.98); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.2)); }
            50% { filter: drop-shadow(0 0 25px rgba(34, 211, 238, 0.5)); }
        }

        .animate-pop {
            animation: popIn 0.4s ease-out forwards;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-glow {
            animation: pulseGlow 3s ease-in-out infinite;
        }

        .option-btn {
            transition: all 0.2s;
        }
        .option-btn:hover {
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 0.9);
            border-color: #22d3ee;
        }

        .lang-active {
            color: #22d3ee;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.6);
            transform: scale(1.1);
            opacity: 1;
        }
        .lang-inactive {
            color: #64748b;
            font-weight: 400;
            transform: scale(0.9);
            opacity: 0.6;
        }
        .lang-text {
            transition: all 0.3s;
            display: inline-block;
        }

</head>

                enEl.className = "lang-text lang-inactive";

            const placeholderColor = isCorrect ? 'text-emerald-400' : 'text-rose-400';
            const shadowColor = isCorrect ? 'shadow-[0_0_30px_rgba(16,185,129,0.3)]' : 'shadow-[0_0_30px_rgba(244,63,94,0.3)]';
            
            const videoNumber = currentScenarioIndex + 1;
            let videoSrc;

            if (isCorrect) {
                videoSrc = `dogru${videoNumber}.mp4`;
            } else {
                let wrongOrder = 1;
                for(let i=0; i<selectedIndex; i++) {
                    if(i !== sc.correctIndex) wrongOrder++;
                }

                videoSrc = `yanlis${globalWrongNumber}.mp4`;

            setTimeout(() => {
                const finalVideoEl = document.getElementById('finalVideo');
                if (finalVideoEl) {
                    let playPromise = finalVideoEl.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => console.log("Final video play error", error));
                    }
                    finalVideoEl.querySelector('source').onerror = function() {
                        document.getElementById('finalVideoErrorMsg').classList.remove('hidden');
                        finalVideoEl.classList.add('hidden');
                    };
                }
            }, 100);
        }

        updateLangToggleUI();
        renderStartScreen();
